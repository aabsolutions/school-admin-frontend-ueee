name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `ng deploy` (not a plain build + angular-cli-ghpages) so it picks up the
      # `baseHref: /school-admin-frontend-ueee/` from angular.json's "deploy" target —
      # a separate build step does NOT apply it, which 404s every lazy chunk on GH Pages.
      - name: Build and deploy to gh-pages
        run: npx ng deploy --repo=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/aabsolutions/school-admin-frontend-ueee.git --name="github-actions[bot]" --email="github-actions[bot]@users.noreply.github.com"
