<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
      <div class="block-header">
        <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
        </app-breadcrumb>
      </div>
    }
    <div class="row">

      <!-- ── Left: People list ─────────────────────────────────────── -->
      <div class="col-xs-12 col-sm-12 col-md-3 col-lg-3">
        <div class="card">
          <div class="body">
            <div id="plist" class="people-list">

              <div class="d-flex justify-content-between align-items-center m-b-10">
                <strong class="people-list-title">Mensajes</strong>
                <button mat-icon-button (click)="openNewConversationDialog()" title="Nueva conversación">
                  <mat-icon>edit</mat-icon>
                </button>
              </div>

              <div class="form-line m-b-15">
                <input type="text" class="form-control" placeholder="Buscar..."
                  [(ngModel)]="searchText" />
              </div>

              <div class="tab-content">
                <ng-scrollbar style="height: 530px" visibility="hover">
                  <app-conversation-list
                    [conversations]="filteredConversations"
                    [selectedId]="selectedConversation?._id"
                    [currentUserId]="currentUserId"
                    (selectConversation)="selectConversation($event)"
                  />
                </ng-scrollbar>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- ── Right: Chat window ────────────────────────────────────── -->
      <div class="col-xs-12 col-sm-12 col-md-9 col-lg-9">
        <div class="card p-0">
          @if (selectedConversation) {
            @if (loadingMessages) {
              <div class="chat-loading">
                <mat-spinner diameter="40" />
              </div>
            } @else {
              <app-chat-window
                [conversation]="selectedConversation"
                [messages]="messages"
                [currentUserId]="currentUserId"
                (sendMessage)="sendMessage($event)"
              />
            }
          } @else {
            <div class="chat-empty-state">
              <mat-icon>chat_bubble_outline</mat-icon>
              <p>Seleccioná una conversación o creá una nueva</p>
              <button mat-stroked-button color="primary" (click)="openNewConversationDialog()">
                <mat-icon>edit</mat-icon> Nueva conversación
              </button>
            </div>
          }
        </div>
      </div>

    </div>
  </div>
</section>
