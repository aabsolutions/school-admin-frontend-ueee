<mat-card class="chart-card4">
  <mat-card-header class="header-menu">
    <mat-card-title>{{ title() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="chart-container">
      <div style="display:block;width:240px;height:240px;">
        <canvas baseChart
          [data]="chartData()"
          [type]="doughnutChartType"
          [options]="chartOptions"
          (chartClick)="onChartClick($event)">
        </canvas>
      </div>
    </div>
    <div class="statistics">
      @for (label of labels(); track $index) {
        <div class="stat-item">
          <span class="count" [style.color]="colors()[$index]">{{ data()[$index] | number }}</span>
          <span class="label">{{ label }}</span>
        </div>
      }
    </div>
  </mat-card-content>
</mat-card>
