<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active"></app-breadcrumb>
    </div>
    }
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title"><h2>Años Lectivos</h2></li>
                <li class="tbl-search-box">
                  <label for="search-input"><i class="material-icons search-icon">search</i></label>
                  <input id="search-input" placeholder="Buscar..." type="text" #filter (keyup)="applyFilter($event)"
                    class="browser-default search-field" aria-label="Search box">
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <app-table-show-hide-column [columnDefinitions]="columnDefinitions"></app-table-show-hide-column>
                <button mat-icon-button (click)="addNew()" class="tbl-header-btn col-green" matTooltip="Agregar">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
                <button mat-icon-button (click)="refresh()" class="tbl-header-btn col-brown" matTooltip="Refrescar">
                  <mat-icon>refresh</mat-icon>
                </button>
                <button mat-icon-button (click)="exportExcel()" class="tbl-header-btn col-blue" matTooltip="Exportar">
                  <mat-icon class="material-icons-outlined">file_download</mat-icon>
                </button>
              </div>
            </div>
          </div>
          <div class="overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">
                <ng-container matColumnDef="select">
                  <mat-header-cell *matHeaderCellDef>
                    <mat-checkbox (change)="$event ? masterToggle() : null"
                      [checked]="selection.hasValue() && isAllSelected()" color="primary"
                      [indeterminate]="selection.hasValue() && !isAllSelected()" [ngClass]="'tbl-checkbox'">
                    </mat-checkbox>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    <mat-checkbox (click)="$event.stopPropagation()" (change)="$event ? selection.toggle(row) : null"
                      [checked]="selection.isSelected(row)" [ngClass]="'tbl-checkbox'" color="primary">
                    </mat-checkbox>
                  </mat-cell>
                </ng-container>

                @for (column of columnDefinitions; track column) {
                  @if (column.type !== 'check' && column.type !== 'actionBtn') {
                    <ng-container [matColumnDef]="column.def">
                      <mat-header-cell *matHeaderCellDef mat-sort-header>
                        <span class="truncate-text">{{ column.label }}</span>
                      </mat-header-cell>
                      <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                        <span class="mobile-label">{{ column.label }}:</span>
                        <span class="truncate-text">{{ row[column.def] }}</span>
                      </mat-cell>
                    </ng-container>
                  }
                }

                <ng-container matColumnDef="actions">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>Acciones</mat-header-cell>
                  <mat-cell *matCellDef="let row" class="pr-0">
                    <button mat-icon-button color="accent" (click)="$event.stopPropagation(); editCall(row)" class="tbl-action-btn">
                      <app-feather-icons [icon]="'edit'" [class]="'tbl-fav-edit'"></app-feather-icons>
                    </button>
                    <button mat-icon-button color="accent" (click)="$event.stopPropagation(); deleteItem(row)" class="tbl-action-btn">
                      <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                    </button>
                  </mat-cell>
                </ng-container>

                <mat-header-row *matHeaderRowDef="getDisplayedColumns()"></mat-header-row>
                <mat-row [@rowsAnimation]="" *matRowDef="let row; columns: getDisplayedColumns();"
                  (click)="editCall(row)" [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </table>
              @if (isLoading) {
                <div class="tbl-spinner">
                  <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate"></mat-progress-spinner>
                </div>
              }
              <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x"
                [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu"></div>
              <mat-menu #contextMenu="matMenu">
                <ng-template matMenuContent let-item="item">
                  <button mat-menu-item (click)="addNew()"><mat-icon>add_box</mat-icon><span>Agregar</span></button>
                  <button mat-menu-item (click)="editCall(item)"><mat-icon>create</mat-icon><span>Editar</span></button>
                  <button mat-menu-item (click)="deleteItem(item)"><mat-icon>delete</mat-icon><span>Eliminar</span></button>
                  <button mat-menu-item (click)="refresh()"><mat-icon>refresh</mat-icon><span>Refrescar</span></button>
                </ng-template>
              </mat-menu>
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0"
                [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 100]">
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
