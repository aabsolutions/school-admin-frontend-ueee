<div class="container">
  <h3 mat-dialog-title>Are you sure?</h3>
  <div mat-dialog-content>
    @if (isBulk) {
      <p>You are about to delete <strong>{{ data.ids!.length }}</strong> teacher(s). This action cannot be undone.</p>
    } @else {
      <ul class="clearfix">
        <li><p><span class="font-weight-bold">Name: </span>{{ data.name }}</p></li>
        <li><p><span class="font-weight-bold">Department: </span>{{ data.department }}</p></li>
        <li><p><span class="font-weight-bold">Mobile: </span>{{ data.mobile }}</p></li>
      </ul>
    }
  </div>
  <div mat-dialog-actions class="mb-1">
    <button mat-flat-button class="formCancelBtn" (click)="confirmDelete()">Delete</button>
    <button mat-flat-button mat-dialog-close color="accent" tabindex="-1">Cancel</button>
  </div>
</div>
