
<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
     <div class="block-header">
       <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
       </app-breadcrumb>
     </div>
     }
    <div class="row">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
          <div class="card">
          <mat-card class="p-3">
            <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
              <mat-form-field class="filter-search" appearance="outline" subscriptSizing="dynamic">
                <mat-label>Buscar</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="Nombre o descripción">
                <mat-icon matSuffix>search</mat-icon>
              </mat-form-field>
              <button mat-flat-button color="primary" (click)="openDialog('add')">
                <mat-icon>add</mat-icon> Nueva Área
              </button>
            </div>

            @if (isLoading) {
              <div class="text-center py-5">
                <mat-spinner diameter="48" class="mx-auto" />
              </div>
            } @else {
              <div class="tableResponsive">
                <table mat-table [dataSource]="dataSource" matSort class="w-100">

                  <ng-container matColumnDef="nombre">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
                    <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
                  </ng-container>

                  <ng-container matColumnDef="descripcion">
                    <th mat-header-cell *matHeaderCellDef>Descripción</th>
                    <td mat-cell *matCellDef="let row" class="text-muted">{{ row.descripcion || '—' }}</td>
                  </ng-container>

                  <ng-container matColumnDef="isActive">
                    <th mat-header-cell *matHeaderCellDef>Estado</th>
                    <td mat-cell *matCellDef="let row">
                      <mat-chip-set>
                        <mat-chip [style.background-color]="row.isActive ? '#e8f5e9' : '#fce4ec'"
                                  [style.color]="row.isActive ? '#2e7d32' : '#c62828'">
                          {{ row.isActive ? 'Activo' : 'Inactivo' }}
                        </mat-chip>
                      </mat-chip-set>
                    </td>
                  </ng-container>

                  <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
                    <td mat-cell *matCellDef="let row" class="text-end">
                      <button mat-icon-button color="primary" matTooltip="Editar" (click)="openDialog('edit', row)">
                        <mat-icon>edit</mat-icon>
                      </button>
                      <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteItem(row)">
                        <mat-icon>delete</mat-icon>
                      </button>
                    </td>
                  </ng-container>

                  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                  <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell text-center py-4" [attr.colspan]="displayedColumns.length">
                      No hay áreas de estudio registradas.
                    </td>
                  </tr>
                </table>
              </div>
              <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
            }
          </mat-card>
        </div>
      </div>
    </div>
  </div>
</section>
