<section class="content">
  <div class="content-block">
  <app-breadcrumb [title]="breadscrums[0].title" [items]="breadscrums[0].items" [active_item]="breadscrums[0].active" />

  <div class="row clearfix">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
      <mat-card class="example-card">
        <mat-card-header>
          <mat-card-title>All Users</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="row">
            <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4">
              <mat-form-field appearance="outline" class="example-full-width">
                <mat-label>Search</mat-label>
                <input matInput placeholder="Search by name, email, role..." (keyup)="applyFilter($event)" />
                <mat-icon matSuffix>search</mat-icon>
              </mat-form-field>
            </div>
            <div class="col-xs-12 col-sm-12 col-md-8 col-lg-8 text-end" style="margin-top:8px">
              <button mat-flat-button color="primary" (click)="openDialog('add')">
                <mat-icon>add</mat-icon> Add User
              </button>
            </div>
          </div>

          @if (isLoading) {
            <div class="text-center p-4">
              <mat-progress-spinner mode="indeterminate" diameter="40" />
            </div>
          }

          <div class="table-responsive">
            <mat-table [dataSource]="dataSource" matSort class="mat-elevation-z0">

              <ng-container matColumnDef="username">
                <mat-header-cell *matHeaderCellDef mat-sort-header>Username</mat-header-cell>
                <mat-cell *matCellDef="let row">
                  <strong>{{ row.username }}</strong>
                </mat-cell>
              </ng-container>

              <ng-container matColumnDef="name">
                <mat-header-cell *matHeaderCellDef mat-sort-header>Name</mat-header-cell>
                <mat-cell *matCellDef="let row">{{ row.name }}</mat-cell>
              </ng-container>

              <ng-container matColumnDef="email">
                <mat-header-cell *matHeaderCellDef mat-sort-header>Email</mat-header-cell>
                <mat-cell *matCellDef="let row">{{ row.email }}</mat-cell>
              </ng-container>

              <ng-container matColumnDef="role">
                <mat-header-cell *matHeaderCellDef mat-sort-header>Role</mat-header-cell>
                <mat-cell *matCellDef="let row">
                  <mat-chip [color]="getRoleColor(row.role)" highlighted>{{ row.role }}</mat-chip>
                </mat-cell>
              </ng-container>

              <ng-container matColumnDef="isActive">
                <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
                <mat-cell *matCellDef="let row">
                  <span [class]="row.isActive ? 'badge bg-success' : 'badge bg-danger'">
                    {{ row.isActive ? 'Active' : 'Inactive' }}
                  </span>
                </mat-cell>
              </ng-container>

              <ng-container matColumnDef="actions">
                <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
                <mat-cell *matCellDef="let row">
                  <button mat-icon-button color="primary" [matTooltip]="'Edit'" (click)="openDialog('edit', row)">
                    <mat-icon>edit</mat-icon>
                  </button>
                  <button mat-icon-button [matTooltip]="row.isActive ? 'Deactivate' : 'Activate'" (click)="toggleStatus(row)">
                    <mat-icon>{{ row.isActive ? 'toggle_on' : 'toggle_off' }}</mat-icon>
                  </button>
                  <button mat-icon-button color="warn" [matTooltip]="'Delete'" (click)="deleteItem(row)">
                    <mat-icon>delete</mat-icon>
                  </button>
                </mat-cell>
              </ng-container>

              <mat-header-row *matHeaderRowDef="displayedColumns" />
              <mat-row *matRowDef="let row; columns: displayedColumns;" [@rowsAnimation]="" />
              <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" [attr.colspan]="displayedColumns.length" style="text-align:center;padding:20px">
                  No users found.
                </td>
              </tr>
            </mat-table>
          </div>
          <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
        </mat-card-content>
      </mat-card>
    </div>
  </div>
  </div>
</section>
