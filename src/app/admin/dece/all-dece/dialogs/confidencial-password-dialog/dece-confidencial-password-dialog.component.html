<div class="p-4" style="min-width:340px">
  <div class="d-flex align-items-center gap-2 mb-3">
    <mat-icon style="color:#e53935">lock</mat-icon>
    <h3 class="m-0">Caso confidencial</h3>
  </div>
  <p class="text-muted small mb-3">
    Ingresá la contraseña maestra DECE para visualizar este caso.
  </p>

  <mat-form-field class="w-100" appearance="outline">
    <mat-label>Contraseña</mat-label>
    <input matInput type="password" [(ngModel)]="password" name="password"
      (keydown.enter)="submit()" [disabled]="verifying" autofocus>
  </mat-form-field>

  @if (errorMsg) {
    <div class="alert alert-danger py-2 px-3 mb-2" style="font-size:12.5px">
      <mat-icon style="font-size:16px;height:16px;width:16px;vertical-align:middle;margin-right:4px">error</mat-icon>
      {{ errorMsg }}
    </div>
  }

  @if (verifying) {
    <mat-progress-bar mode="indeterminate" class="mb-2"></mat-progress-bar>
  }

  <div class="d-flex justify-content-end gap-2 mt-2">
    <button mat-button type="button" (click)="cancel()" [disabled]="verifying">Cancelar</button>
    <button mat-flat-button color="primary" type="button" (click)="submit()" [disabled]="!password || verifying">
      <mat-icon>lock_open</mat-icon> Ver caso
    </button>
  </div>
</div>
