<h3 mat-dialog-title>{{ data.cursoLabel }}</h3>
<div mat-dialog-content>
  @if (students.length) {
    <table mat-table [dataSource]="students" class="w-100">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Estudiante</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="absent">
        <th mat-header-cell *matHeaderCellDef>Ausente</th>
        <td mat-cell *matCellDef="let row">
          <span class="badge bg-danger">{{ row.absent }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="late">
        <th mat-header-cell *matHeaderCellDef>Tardanza</th>
        <td mat-cell *matCellDef="let row">
          <span class="badge bg-warning text-dark">{{ row.late }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="excused">
        <th mat-header-cell *matHeaderCellDef>Justificado</th>
        <td mat-cell *matCellDef="let row">
          <span class="badge bg-secondary">{{ row.excused }}</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  } @else {
    <p class="text-muted text-center py-3">Sin ausencias, tardanzas ni justificaciones registradas.</p>
  }
</div>
<div mat-dialog-actions class="mb-1">
  <button mat-flat-button mat-dialog-close color="accent" tabindex="-1">Cerrar</button>
</div>
