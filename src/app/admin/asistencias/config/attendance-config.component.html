<app-breadcrumb [title]="breadscrums[0].title" [items]="breadscrums[0].items" [active_item]="breadscrums[0].active"></app-breadcrumb>

<section class="content">
  <div class="container-fluid">
    <div class="row clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div class="card">
          <div class="header d-flex justify-content-between align-items-center">
            <h2>Asignaciones de Registro de Asistencia</h2>
            <button mat-flat-button color="primary" (click)="openDialog()">
              <mat-icon>add</mat-icon> Nueva Asignación
            </button>
          </div>
          <div class="body table-responsive">
            @if (isLoading) {
              <div class="d-flex justify-content-center p-4">
                <mat-spinner diameter="40"></mat-spinner>
              </div>
            } @else {
              <table mat-table [dataSource]="dataSource" class="w-100">

                <ng-container matColumnDef="user">
                  <th mat-header-cell *matHeaderCellDef>Usuario</th>
                  <td mat-cell *matCellDef="let row">{{ row.userId?.name }}</td>
                </ng-container>

                <ng-container matColumnDef="role">
                  <th mat-header-cell *matHeaderCellDef>Rol</th>
                  <td mat-cell *matCellDef="let row">{{ row.userId?.role }}</td>
                </ng-container>

                <ng-container matColumnDef="curso">
                  <th mat-header-cell *matHeaderCellDef>Curso</th>
                  <td mat-cell *matCellDef="let row">{{ cursoLabel(row) }}</td>
                </ng-container>

                <ng-container matColumnDef="year">
                  <th mat-header-cell *matHeaderCellDef>Año Lectivo</th>
                  <td mat-cell *matCellDef="let row">{{ row.cursoLectivoId?.academicYear }}</td>
                </ng-container>

                <ng-container matColumnDef="active">
                  <th mat-header-cell *matHeaderCellDef>Estado</th>
                  <td mat-cell *matCellDef="let row">
                    <span class="badge" [class.bg-success]="row.isActive" [class.bg-secondary]="!row.isActive">
                      {{ row.isActive ? 'Activo' : 'Inactivo' }}
                    </span>
                  </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                  <th mat-header-cell *matHeaderCellDef>Acciones</th>
                  <td mat-cell *matCellDef="let row">
                    <button mat-icon-button color="warn" matTooltip="Eliminar asignación" (click)="delete(row)">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <tr class="mat-row" *matNoDataRow>
                  <td class="mat-cell text-center py-4" [attr.colspan]="displayedColumns.length">
                    No hay asignaciones configuradas.
                  </td>
                </tr>
              </table>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
