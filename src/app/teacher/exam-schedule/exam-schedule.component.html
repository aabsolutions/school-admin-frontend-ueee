<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
      </app-breadcrumb>
    </div>
    }
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2>Exam Schedule</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input"><i class="material-icons search-icon">search</i></label>
                  <input id="search-input" placeholder="Search" type="text" #filter (keyup)="applyFilter($event)"
                    class="browser-default search-field" aria-label="Search box">
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">

                <app-table-show-hide-column [columnDefinitions]="columnDefinitions"></app-table-show-hide-column>

                <button mat-icon-button (click)="exportExcel()" class="tbl-header-btn col-blue"
                  matTooltip="Xlsx Download">
                  <mat-icon class="material-icons-outlined">file_download</mat-icon>
                </button>
              </div>
            </div>
          </div>
          <div class="overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">
                @for (column of columnDefinitions; track column) {
                <ng-container [matColumnDef]="column.def">
                  <mat-header-cell *matHeaderCellDef mat-sort-header>
                    <span class="truncate-text">{{ column.label }}</span>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    <span class="mobile-label">{{ column.label }}:</span>
                    <span class="truncate-text">{{ row[column.def] }}</span>
                  </mat-cell>
                </ng-container>
                }
                <mat-header-row *matHeaderRowDef="getDisplayedColumns()"></mat-header-row>
                <mat-row [@rowsAnimation]="" *matRowDef="let row; columns: getDisplayedColumns();"
                  [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </table>
              <!-- Loading spinner -->
              @if (isLoading) {
              <div class="tbl-spinner">
                <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
                </mat-progress-spinner>
              </div>
              }
              @if (isLoading) {
              <div class="no-results" [style.display]="dataSource.data.length === 0 ? '' : 'none'">
                No results
              </div>
              }
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]">
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
